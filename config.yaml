network:
  # Each entry is a directory containing a GTFS feed (stops.txt, trips.txt, stop_times.txt, routes.txt).
  # Add multiple entries to merge feeds into one unified graph.
  # To switch networks, change these paths and update starting_station below.
  feeds:
    - "data/nyc_subway_gtfs"
  # "parent" = use parent_station field to collapse platforms into stations (good for NYC subway).
  # "name"   = merge stops with identical names across feeds (good for multi-operator networks).
  merge_strategy: "parent"

game:
  starting_coins: 50
  daily_stipend: 20 # coins given to each team at the start of each new day
  starting_station: "Times Sq-42 St"
  num_days: 5
  day_start: "07:30"
  day_end: "17:30"
  max_chip_differential: 5 # max lead one team can hold over the other at any station (max chips = opp_chips + 5)

travel:
  min_chips_per_stop: 1
  own_station_penalty: 1 # chips paid when transiting own station at zero balance
  enemy_station_penalty: 3 # chips paid to opponent when transiting their station at zero balance

challenges:
  initial_count: 3
  spawn_threshold: 9 # if board has fewer than this, spawn 2 on completion; else spawn 1
  chip_gain_base: 50
  steal_fraction: 0.20 # 20% of opponent balance
  steal_probability: 0.25 # probability a new challenge is a steal (vs chip_gain)
  daily_multiplier: 1.10 # challenges become 10% more valuable each day
  completion_time_minutes: 30

simulation:
  speed_options: [1, 5, 20, 100, 1000, 10000, 100000] # available speed multipliers in UI
  clock_increment_minutes: 1

agents:
  max_departures_k: 10 # K departure slots in observation (was 30; reduced for smaller obs)
  c_max: 10 # challenge slots encoded in observation (C_MAX)
  heuristic_reachability_window: 120 # minutes ahead to scan for departures
  heuristic_extra_chips: 0 # extra chips placed above minimum on neutral/contested stops (0–4)
  heuristic_challenge_window: 180 # wider lookahead (minutes) used specifically to find challenge stations
  heuristic_challenge_k: 50 # number of departures to scan when searching for a challenge station
  heuristic_low_coins_threshold: 15 # below this coin balance, prioritise challenges over expansion

training:
  algorithm: "MaskablePPO"
  total_timesteps: 5_000_000
  learning_rate: 0.0003
  n_steps: 2048 # PPO rollout length
  batch_size: 64
  n_epochs: 10
  gamma: 0.99
  clip_range: 0.2
  opponent_swap_interval: 50 # episodes between opponent policy swaps
  eval_interval: 500 # episodes between heuristic evaluations
  eval_episodes: 50 # games per evaluation (fast; increase once model improves)
  win_rate_target: 0.95 # stop training when this is reached
  log_file: "training_log.csv"
  snapshot_dir: "checkpointsnew/"
